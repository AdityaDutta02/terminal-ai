services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    environment:
      DOCKER_API_VERSION: "1.45"
    networks:
      - proxy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: terminalai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/terminalai
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      EMBED_TOKEN_SECRET: ${EMBED_TOKEN_SECRET}
      NEXT_PUBLIC_APP_URL: ${BETTER_AUTH_URL}
      GATEWAY_INTERNAL_URL: http://gateway:3001
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_LIVE_PLAN_ID_MONTHLY: ${RAZORPAY_LIVE_PLAN_ID_MONTHLY}
      RAZORPAY_LIVE_PLAN_ID_ANNUAL: ${RAZORPAY_LIVE_PLAN_ID_ANNUAL}
      RAZORPAY_LIVE_OFFER_ID_MONTHLY_CARD: ${RAZORPAY_LIVE_OFFER_ID_MONTHLY_CARD}
      RAZORPAY_LIVE_OFFER_ID_MONTHLY_UPI: ${RAZORPAY_LIVE_OFFER_ID_MONTHLY_UPI}
      RAZORPAY_TEST_PLAN_ID_MONTHLY: ${RAZORPAY_TEST_PLAN_ID_MONTHLY}
      RAZORPAY_TEST_PLAN_ID_ANNUAL: ${RAZORPAY_TEST_PLAN_ID_ANNUAL}
      RAZORPAY_TEST_OFFER_ID_MONTHLY_CARD: ${RAZORPAY_TEST_OFFER_ID_MONTHLY_CARD}
      RAZORPAY_TEST_OFFER_ID_MONTHLY_UPI: ${RAZORPAY_TEST_OFFER_ID_MONTHLY_UPI}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: terminalai
      DEPLOY_MANAGER_URL: http://deploy-manager:3002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-Terminal AI <noreply@terminalai.studioionique.com>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.platform.rule=Host(`terminalai.studioionique.com`)
      - traefik.http.routers.platform.entrypoints=websecure
      - traefik.http.routers.platform.tls.certresolver=letsencrypt
      - traefik.http.routers.platform.middlewares=secure-headers@file
      - traefik.http.services.platform.loadbalancer.server.port=3000
      - traefik.http.routers.platform-http.rule=PathPrefix(`/`)
      - traefik.http.routers.platform-http.entrypoints=web
      - traefik.http.routers.platform-http.service=platform
      - traefik.http.routers.platform-http.priority=1

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/terminalai
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      EMBED_TOKEN_SECRET: ${EMBED_TOKEN_SECRET}
      PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.gateway.rule=Host(`api.terminalai.studioionique.com`)
      - traefik.http.routers.gateway.entrypoints=websecure
      - traefik.http.routers.gateway.tls.certresolver=letsencrypt
      - traefik.http.routers.gateway.middlewares=secure-headers@file,rate-limit@file
      - traefik.http.services.gateway.loadbalancer.server.port=3001
    mem_limit: 512m
    memswap_limit: 512m

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    environment:
      CLAMD_CONF_ScanOnAccess: 'no'
    volumes:
      - clamav_db:/var/lib/clamav
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'echo PING | nc -q1 localhost 3310 | grep -q PONG']
      interval: 60s
      timeout: 10s
      retries: 5

  deploy-manager:
    build:
      context: ./deploy-manager
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/terminalai
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      COOLIFY_URL: ${COOLIFY_URL}
      COOLIFY_TOKEN: ${COOLIFY_TOKEN}
      COOLIFY_SERVER_UUID: ${COOLIFY_SERVER_UUID}
      COOLIFY_PROJECT_UUID: ${COOLIFY_PROJECT_UUID}
      CLOUDFLARE_TOKEN: ${CLOUDFLARE_TOKEN}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      VPS2_IP: ${VPS2_IP}
      GATEWAY_URL: http://gateway:3001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      PORT: '3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy
      - internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/terminalai
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      EMBED_TOKEN_SECRET: ${EMBED_TOKEN_SECRET}
      TERMINAL_AI_GATEWAY_URL: http://gateway:3001
      DEPLOY_MANAGER_URL: http://deploy-manager:3002
      PORT: '3003'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.mcp.rule=Host(`mcp.terminalai.studioionique.com`)
      - traefik.http.routers.mcp.entrypoints=websecure
      - traefik.http.routers.mcp.tls.certresolver=letsencrypt
      - traefik.http.routers.mcp.middlewares=secure-headers@file,rate-limit@file
      - traefik.http.services.mcp.loadbalancer.server.port=3003
      - traefik.http.routers.mcp-http.rule=PathPrefix(`/mcp`)
      - traefik.http.routers.mcp-http.entrypoints=web
      - traefik.http.routers.mcp-http.priority=10
      - traefik.http.routers.mcp-http.service=mcp

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
  clamav_db:
  letsencrypt:

networks:
  proxy:
    external: true
  internal:
    internal: true
